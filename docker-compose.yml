services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: changepath
      POSTGRES_PASSWORD: changepath_dev
      POSTGRES_DB: changepath
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # MinIO stub for future evidence upload
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: changepath
      MINIO_ROOT_PASSWORD: changepath_dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
